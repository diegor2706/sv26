<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Experiencias</title>
    
    <link rel="preload" as="image" href="img/fondos/9781477_orig.jpg">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="dynamic-bg"></div>

    <button id="audio-control" class="audio-btn" onclick="toggleSound()">
        <span id="audio-icon" class="material-symbols-outlined">volume_off</span>
    </button>

    <h2>Galería de Experiencias</h2>

    <div class="coverflow-scene">
        <div class="coverflow-list" id="list"></div>
    </div>

    <div class="info-panel">
        <div class="destination-title" id="title">Cargando...</div>
        <div class="destination-desc" id="desc">...</div>
    </div>

    <div class="controls">
        <button onclick="prev()">❮ Anterior</button>
        <button onclick="next()">Siguiente ❯</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
